name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build Docker image
        run: nix build .#docker

      - name: Prepare image artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cp --dereference result docker-image.tar.gz

      - name: Upload image artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: docker-image
          path: docker-image.tar.gz
          if-no-files-found: error
          retention-days: 1

  push:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-image

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          UPSTREAM_VERSION=$(grep -oP 'version = "\K[^"]+' flake.nix)
          echo "upstream=${UPSTREAM_VERSION}" >> "$GITHUB_OUTPUT"

          # Determine copilot revision from existing git tags
          git fetch --tags --quiet
          EXISTING=$(git tag -l "${UPSTREAM_VERSION}-*" | grep -oP "^${UPSTREAM_VERSION}-\K[0-9]+" | sort -n | tail -1 || true)

          COPILOT_REV=$(( ${EXISTING:-0} + 1 ))
          COPILOT_VERSION="${UPSTREAM_VERSION}-${COPILOT_REV}"
          echo "copilot=${COPILOT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${COPILOT_VERSION}"

      - name: Push image to GHCR
        run: |
          IMAGE_ID="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_ID=$(echo "$IMAGE_ID" | tr '[:upper:]' '[:lower:]')

          LOADED=$(docker load < docker-image.tar.gz)
          IMAGE_REF=$(echo "$LOADED" | grep -oP 'Loaded image: \K.*')
          docker tag "$IMAGE_REF" "$IMAGE_ID:latest"
          docker tag "$IMAGE_REF" "$IMAGE_ID:${{ github.sha }}"
          docker tag "$IMAGE_REF" "$IMAGE_ID:${{ steps.version.outputs.copilot }}"

          docker push "$IMAGE_ID:latest"
          docker push "$IMAGE_ID:${{ github.sha }}"
          docker push "$IMAGE_ID:${{ steps.version.outputs.copilot }}"

      - name: Create version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.copilot }}" || true
          git push origin "${{ steps.version.outputs.copilot }}" || true
